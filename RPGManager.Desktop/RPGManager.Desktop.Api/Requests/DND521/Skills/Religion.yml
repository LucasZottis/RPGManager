http:
  method: POST
  url: "{{url}}/skill/create"
  body:
    type: json
    data: |-
      {
        "BaseAbilityScoreId": "{{Intelligence}}",
        "Name": "Religião",
        "Description": "Seu teste de Inteligência (Religião) mede sua capacidade de recordar conhecimentos sobre divindades, ritos e orações, hierarquias religiosas, símbolos sagrados e as práticas de cultos secretos."
