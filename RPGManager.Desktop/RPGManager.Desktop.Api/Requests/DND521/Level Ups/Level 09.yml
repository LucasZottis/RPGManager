info:
  name: Level 09
  type: http
  seq: 9

http:
  method: POST
  url: "{{url}}/level-up/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "LevelNumber": 9,
        "ExperiencePoints": 48000,
        "ProficiencyBonus": 4
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
