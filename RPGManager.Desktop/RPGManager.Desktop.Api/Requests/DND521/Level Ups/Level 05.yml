info:
  name: Level 05
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/level-up/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "LevelNumber": 5,
        "ExperiencePoints": 6500,
        "ProficiencyBonus": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
