info:
  name: Firearm Bullet
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/ammunition-type/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Projéteis de Arma de Fogo",
        "Amount": 10,
        "Storage": "Algibeira",
        "Weight": 0.90,
        "Cost": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
