info:
  name: Acid
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Ácido",
        "Description": "Ao usar a ação Atacar, você pode substituir um de seus ataques por arremessar um frasco de Ácido. Escolha uma criatura ou objeto que você possa ver a até 6 metros de distância. O alvo deve ser bem-sucedido em um teste de resistência de Destreza (CD 8 mais seu modificador de Destreza e bônus de proficiência) ou sofrerá 2d6 de dano de Ácido.",
        "Cost": 25,
        "Weight": 0.45
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
