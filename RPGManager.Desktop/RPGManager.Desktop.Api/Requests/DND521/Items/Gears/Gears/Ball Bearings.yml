info:
  name: Ball Bearings
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Esferas de Metal",
        "Description": "Como uma ação de Utilizar, você pode derramar Esferas de Metal de sua bolsa. Eles se espalham, cobrindo uma área plana de 3 metros quadrados a até 3 metros de você. Uma criatura que entrar nessa área pela primeira vez em um turno deve ser bem-sucedida em um teste de resistência de Destreza CD 10 ou ficará Prostrada. Leva 10 minutos para cobrir novamente os Rolamentos de Esferas.",
        "Cost": 1,
        "Weight": 0.91
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
