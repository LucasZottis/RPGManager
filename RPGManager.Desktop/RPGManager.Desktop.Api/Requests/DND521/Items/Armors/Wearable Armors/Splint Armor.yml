info:
  name: Splint Armor
  type: http
  seq: 11

http:
  method: POST
  url: "{{url}}/armor/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "ArmorCategoryId": "{{Heavy_Armor_Category}}",
        "ArmorClassAbilityScoreModifierId": null,
        "RequiredAbilityScoreId": "{{Strength}}",

        "Name": "Armadura de Talas",
        "BaseArmorClass": 17,
        "AppliesAbilityModifier": false,
        "MaxAbilityModifier": null,
        "RequiredAbilityScoreMinimum": 15,
        "DisadvantageOnStealth": true,
        "ArmorClassBonus": 0,
        "Weight": 27.22,
        "Cost": 200
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
