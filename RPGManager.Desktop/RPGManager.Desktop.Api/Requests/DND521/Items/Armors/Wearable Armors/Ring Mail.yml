info:
  name: Ring Mail
  type: http
  seq: 9

http:
  method: POST
  url: "{{url}}/armor/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "ArmorCategoryId": "{{Heavy_Armor_Category}}",
        "ArmorClassAbilityScoreModifierId": null,
        "RequiredAbilityScoreId": null,

        "Name": "Armadura de Anéis",
        "BaseArmorClass": 14,
        "AppliesAbilityModifier": false,
        "MaxAbilityModifier": null,
        "RequiredAbilityScoreMinimum": null,
        "DisadvantageOnStealth": true,
        "ArmorClassBonus": 0,
        "Weight": 18.14,
        "Cost": 30
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
