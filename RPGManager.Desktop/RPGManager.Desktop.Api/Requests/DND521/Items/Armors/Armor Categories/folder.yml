      code: |-
        if (res.getStatus() === 200) {
          const name = req.getName().replace(" ", "_");
          const id = res.body;  
          const varName = `${name}_Armor_Category`
          
          console.log(`${name}: ${id}`);
          bru.setVar(varName, id);
        }
