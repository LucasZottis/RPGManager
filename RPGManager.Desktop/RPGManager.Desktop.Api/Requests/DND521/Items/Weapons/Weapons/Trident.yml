info:
  name: Trident
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/item/weapon/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Tridente",
        "Cost": 5,
        "Weight": 1.8,
        "WeaponCategoryId": "{{Martial_Weapon_Category}}",
        "WeaponTypeId": "{{Melee_Weapon_Type}}",
        "WeaponMasteryPropertyId": "{{Topple_Weapon_mastery_property}}",
        "BaseAbilityScoreId": "{{Strength}}",
        "Properties": [
          {
            "WeaponPropertyId": "{{Thrown_Weapon_Property}}",
            "NormalRange": 6,
            "LongRange": 18
          },
          {
            "WeaponPropertyId": "{{Versatile_Weapon_Property}}",
            "NormalRange": null,
            "LongRange": null,
            "VersatileDiceTypeId": "{{D10}}"
          }
        ],
        "Damages": [
          {
            "DamageTypeId": "{{Piercing_Damage_Type}}",
            "DamageDiceTypes": [
              {
                "DiceTypeId": "{{D8}}",
                "Quantity": 1
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
