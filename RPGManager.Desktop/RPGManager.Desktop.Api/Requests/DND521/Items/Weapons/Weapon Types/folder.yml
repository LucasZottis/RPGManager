info:
  name: Weapon Types
  type: folder
  seq: 4

request:
  auth: inherit
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const name = req.getName().replace(" ", "_");
          const id = res.body;  
          const varName = `${name}_Weapon_Type`
          
          console.log(`${name}: ${id}`);
          bru.setVar(varName, id);
        }
