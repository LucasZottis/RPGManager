              {
                "ParentClassFeatureId": null,
                "Name": "Defesa Sem Armadura",
                "Description": "Enquanto você não estiver usando armadura, sua Classe de Armadura base será igual a 10 mais seus modificadores de Destreza e Constituição. Você pode usar um escudo e ainda assim obter esse benefício."
              },
              {
                "ParentClassFeatureId": null,
                "Name": "Domínio de Armas",
                "Description": "Seu treinamento com armas permite que você use as propriedades de maestria de dois tipos de armas de combate corpo a corpo simples ou marciais à sua escolha, como machados grandes e machados de mão. Sempre que você terminar um descanso longo, poderá praticar exercícios com armas e trocar uma dessas opções de arma. Ao atingir certos níveis de Bárbaro, você adquire a habilidade de usar as propriedades de maestria de mais tipos de armas, conforme mostrado na coluna Maestria em Armas da tabela de Características de Bárbaro.",
