            "Features": [
              {
                "ParentClassFeatureId": null,
                "Name": "Fúria",
                "Description": "Você pode se imbuir de um poder primordial chamado Fúria, uma força que lhe concede poder e resistência extraordinários. Você pode acessá-la como uma Ação Bônus se não estiver usando armadura pesada. Você pode inserir sua Fúria o número de vezes mostrado para o seu nível de Bárbaro na coluna Fúrias da tabela de Características do Bárbaro. Você recupera um uso gasto ao terminar um Descanso Curto e recupera todos os usos gastos ao terminar um Descanso Longo. Enquanto estiver ativa, sua Fúria segue as regras abaixo. Resistência a Dano. Você tem resistência a dano de concussão, perfuração e corte. Dano de Fúria. Quando você realiza um ataque usando Força — seja com uma arma ou um ataque desarmado — e causa dano ao alvo, você recebe um bônus de dano que aumenta conforme você sobe de nível como Bárbaro, conforme mostrado na coluna Dano de Fúria da tabela de Características do Bárbaro. Vantagem em Força. Você tem vantagem em testes de Força e em testes de resistência de Força. Sem Concentração ou Magias. Você não pode manter a Concentração e não pode conjurar magias. Duração. A Fúria dura até o final do seu próximo turno e termina mais cedo se você vestir armadura pesada ou estiver incapacitado. Se sua Fúria ainda estiver ativa no seu próximo turno, você pode estendê-la por mais uma rodada fazendo uma das seguintes ações: • Realizar uma jogada de ataque contra um inimigo. • Forçar um inimigo a fazer um teste de resistência. • Usar uma Ação Bônus para estender sua Fúria. Cada vez que a Fúria é estendida, ela dura até o final do seu próximo turno. Você pode manter a Fúria por até 10 minutos.",
