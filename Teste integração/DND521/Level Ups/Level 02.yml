info:
  name: Level 02
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/level-up/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "LevelNumber": 2,
        "ExperiencePoints": 300,
        "ProficiencyBonus": 2
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
