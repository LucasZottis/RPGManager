info:
  name: Level 14
  type: http
  seq: 14

http:
  method: POST
  url: "{{url}}/level-up/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "LevelNumber": 14,
        "ExperiencePoints": 140000,
        "ProficiencyBonus": 5
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
