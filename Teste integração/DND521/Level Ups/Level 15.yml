info:
  name: Level 15
  type: http
  seq: 15

http:
  method: POST
  url: "{{url}}/level-up/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "LevelNumber": 15,
        "ExperiencePoints": 165000,
        "ProficiencyBonus": 5
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
