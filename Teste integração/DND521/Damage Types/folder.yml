info:
  name: Damage Types
  type: folder
  seq: 2

request:
  auth: inherit
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const name = req.getName().replace(" ", "_");
          const id = res.body;  
          const varName = `${name}_Damage_Type`
          
          console.log(`${name}: ${id}`);
          bru.setVar(varName, id);
        }
