info:
  name: Chain Mail
  type: http
  seq: 10

http:
  method: POST
  url: "{{url}}/armor/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "ArmorCategoryId": "{{Heavy_Armor_Category}}",
        "ArmorClassAbilityScoreModifierId": null,
        "RequiredAbilityScoreId": "{{Strength}}",

        "Name": "Cota de Malha Pesada",
        "BaseArmorClass": 16,
        "AppliesAbilityModifier": false,
        "MaxAbilityModifier": null,
        "RequiredAbilityScoreMinimum": 13,
        "DisadvantageOnStealth": true,
        "ArmorClassBonus": 0,
        "Weight": 24.95,
        "Cost": 75
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
