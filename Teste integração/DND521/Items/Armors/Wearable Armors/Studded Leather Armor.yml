info:
  name: Studded Leather Armor
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/armor/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "ArmorCategoryId": "{{Light_Armor_Category}}",
        "ArmorClassAbilityScoreModifierId": "{{Dexterity}}",
        "RequiredAbilityScoreId": null,

        "Name": "Armadura de Couro Batido",
        "BaseArmorClass": 12,
        "AppliesAbilityModifier": true,
        "MaxAbilityModifier": null,
        "RequiredAbilityScoreMinimum": null,
        "DisadvantageOnStealth": false,
        "ArmorClassBonus": 0,
        "Weight": 5.9,
        "Cost": 45
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
