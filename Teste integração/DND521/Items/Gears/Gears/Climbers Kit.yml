info:
  name: Climbers Kit
  type: http
  seq: 22

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Kit de Escalada",
        "Description": "Um Kit de Escalada inclui ponteiras para botas, luvas, pitons e um arnês. Como uma ação de Utilizar, você pode usar o Kit de Escalada para se ancorar; ao fazer isso, você não pode cair mais de 7,5 metros (25 pés) do ponto de ancoragem e não pode se mover mais de 7,5 metros (25 pés) dali sem desfazer a ancoragem como uma Ação Bônus.",
        "Cost": 25,
        "Weight": 5.44
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
