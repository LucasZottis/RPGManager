info:
  name: Traveler’s Clothes
  type: http
  seq: 23

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Roupas de Viajante",
        "Description": "As roupas de viajante são peças resistentes, projetadas para viagens em diversos ambientes.",
        "Cost": 2,
        "Weight": 1.81
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
