info:
  name: Pole
  type: http
  seq: 55

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Copper_Piece_Currency_Type}}",
        "Name": "Vara",
        "Description": "Uma Vara tem 3 metros de comprimento. Você pode usá-la para tocar algo a até 3 metros de distância. Se você deve fazer um teste de Força (Atletismo) como parte de um Salto Alto ou Longo, pode usar a Vara para saltar com vara, ganhando Vantagem no teste.",
        "Cost": 5,
        "Weight": 3.1751
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
