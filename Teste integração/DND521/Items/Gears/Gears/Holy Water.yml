info:
  name: Holy Water
  type: http
  seq: 35

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Água Benta",
        "Description": "Quando você faz a ação de Ataque, pode substituir um de seus ataques arremessando um frasco de Água Benta. Escolha uma criatura que você possa ver dentro de 6 metros de você. O alvo deve ser bem-sucedido em um teste de resistência de Destreza (CD 8 + seu modificador de Destreza e Bônus de Proficiência) ou sofrer 2d8 de dano Radiante se for um Fiend ou um Morto-Vivo.",
        "Cost": 25,
        "Weight": 0.4536
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
