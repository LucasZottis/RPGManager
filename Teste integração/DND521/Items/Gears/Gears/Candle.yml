info:
  name: Candle
  type: http
  seq: 16

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Copper_Piece_Currency_Type}}",
        "Name": "Vela",
        "Description": "Por 1 hora, uma vela emite luz brilhante em um raio de 1,5 metro e penumbra por mais 1,5 metro.",
        "Cost": 1,
        "Weight": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
