info:
  name: Entertainers Pack
  type: http
  seq: 30

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Kit do Artista",
        "Description": "Um Pacote de Artista contém os seguintes itens: Mochila, Saco de Dormir, Sino, Lanterna Olho de Boi, 3 Fantasias, Espelho, 8 Frascos de Óleo, Ração para 9 dias, Caixa de Lata e Cantil",
        "Cost": 40,
        "Weight": 26.53
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
