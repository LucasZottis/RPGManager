info:
  name: Healer's Kit
  type: http
  seq: 42
http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Kit de Curandeiro",
        "Description": "Um Kit de Curandeiro tem dez usos. Como uma ação de Utilizar, você pode gastar um de seus usos para estabilizar uma criatura Inconsciente com 0 Pontos de Vida sem precisar fazer um teste de Sabedoria (Medicina).",
        "Cost": 5,
        "Weight": 1.3608
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
