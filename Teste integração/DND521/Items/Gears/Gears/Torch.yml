info:
  name: Torch
  type: http
  seq: 76

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Copper_Piece_Currency_Type}}",
        "Name": "Tocha",
        "Description": "Uma Tocha queima por 1 hora, emitindo Luz Brilhante em um raio de 6 metros e Luz Fraca por mais 6 metros. Quando você faz a ação de Ataque, pode atacar com a Tocha, usando-a como uma arma Simples de Combate Corpo a Corpo. Em um acerto, o alvo sofre 1 de dano de Fogo.",
        "Cost": 1,
        "Weight": 0.4536
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
