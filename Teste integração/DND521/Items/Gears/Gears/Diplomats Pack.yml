info:
  name: Diplomats Pack
  type: http
  seq: 28

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Kit do Diplomata",
        "Description": "Um Pacote de Diplomata contém os seguintes itens: Baú, Roupas Finas, Tinta, 5 Canetas de Tinta, Lâmpada, 2 Estojos para Mapas ou Pergaminhos, 4 Frascos de Óleo, 5 Folhas de Papel, 5 Folhas de Pergaminho, Perfume e Caixa de Isqueiro",
        "Cost": 39,
        "Weight": 17.69
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
