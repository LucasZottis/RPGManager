info:
  name: Backpack
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Mochila",
        "Description": "Uma mochila comporta até 13,6 kg (30 libras) em um volume de 0,028 m³ (1 pé cúbico). Ela também pode ser usada como alforje.",
        "Cost": 2,
        "Weight": 2.27
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
