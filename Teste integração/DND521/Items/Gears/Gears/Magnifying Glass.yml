info:
  name: Magnifying Glass
  type: http
  seq: 45

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Lupa",
        "Description": "Uma Lupa concede Vantagem em qualquer teste de habilidade feito para avaliar ou inspecionar um item muito detalhado. Acender um fogo com uma Lupa requer luz tão brilhante quanto a luz solar para focar, isca para acender e cerca de 5 minutos para o fogo pegar.",
        "Cost": 100,
        "Weight": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
