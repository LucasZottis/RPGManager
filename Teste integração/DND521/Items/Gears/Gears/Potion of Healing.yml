info:
  name: Potion of Healing
  type: http
  seq: 57

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Poção de Cura",
        "Description": "Esta poção é um item mágico. Como uma Ação Bônus, você pode bebê-la ou administrá-la a outra criatura dentro de 1,5 metros de você. A criatura que beber o líquido vermelho mágico neste frasco recupera 2d4 + 2 Pontos de Vida.",
        "Cost": 50,
        "Weight": 0.2268
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
