info:
  name: Crossbow Bolt Case
  type: http
  seq: 18

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Estojo de Virotes de Besta",
        "Description": "Este Estojo de Virotes de Besta pode conter até 20 virotes de besta.",
        "Cost": 1,
        "Weight": 0.45
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
