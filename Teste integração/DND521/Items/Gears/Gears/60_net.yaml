info:
  name: Net
  type: http
  seq: 60
http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Rede",
        "Description": "Quando você faz a ação de Ataque, pode substituir um de seus ataques arremessando uma Rede. Escolha uma criatura que você possa ver dentro de 4,5 metros de você. O alvo deve ser bem-sucedido em um teste de resistência de Destreza (CD 8 + seu modificador de Destreza e Bônus de Proficiência) ou ficar com a condição de Contido até escapar. O alvo é bem-sucedido automaticamente se for Grande ou maior.",
        "Cost": 1,
        "Weight": 1.3608
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
