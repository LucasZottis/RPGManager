info:
  name: Perfume
  type: http
  seq: 53

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Perfume",
        "Description": "O Perfume vem em um frasco de 120ml. Por 1 hora após aplicar Perfume em si mesmo, você tem Vantagem nos testes de Carisma (Persuasão) feitos para influenciar um Humanoide Indiferente dentro de 1,5 metros de você.",
        "Cost": 5,
        "Weight": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
