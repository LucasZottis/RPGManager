info:
  name: Basket
  type: http
  seq: 7

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Silver_Piece_Currency_Type}}",
        "Name": "Cesto",
        "Description": "Uma cesta comporta até 18 kgs em um volume de 2 pés cúbicos.",
        "Cost": 4,
        "Weight": 0.91
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
