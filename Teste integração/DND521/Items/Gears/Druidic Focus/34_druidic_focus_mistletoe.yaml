info:
  name: Druidic Focus (Sprig of Mistletoe)
  type: http
  seq: 34
http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Foco Druídico (Ramo de Visco)",
        "Description": "Um Foco Druídico em forma de ramo de visco, entalhado, amarrado com fita ou pintado para canalizar magia primordial. Um Druida ou Patrulheiro pode usar este objeto como Foco de Conjuração.",
        "Cost": 1,
        "Weight": 0
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
