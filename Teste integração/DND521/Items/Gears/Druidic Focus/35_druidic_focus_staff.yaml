info:
  name: Druidic Focus (Wooden Staff)
  type: http
  seq: 35
http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Foco Druídico (Cajado de Madeira)",
        "Description": "Um Foco Druídico em forma de cajado de madeira (também funciona como um Quarterstaff), entalhado, amarrado com fita ou pintado para canalizar magia primordial. Um Druida ou Patrulheiro pode usar este objeto como Foco de Conjuração.",
        "Cost": 5,
        "Weight": 1.8144
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
