info:
  name: Yew Wand Druidic Focus
  type: http
  seq: 36

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Foco Druídico (Varinha de Teixo)",
        "Description": "Um Foco Druídico em forma de varinha de teixo, entalhado, amarrado com fita ou pintado para canalizar magia primordial. Um Druida ou Patrulheiro pode usar este objeto como Foco de Conjuração.",
        "Cost": 10,
        "Weight": 0.4536
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
