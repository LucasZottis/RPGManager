info:
  name: Emblem Holy Symbols
  type: http
  seq: 44

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Símbolo Sagrado (Emblema)",
        "Description": "Um Símbolo Sagrado em forma de emblema (usado em tecido ou em um Escudo), adornado com joias ou pintado para canalizar magia divina. Um Clérigo ou Paladino pode usar um Símbolo Sagrado como Foco de Conjuração.",
        "Cost": 5,
        "Weight": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
