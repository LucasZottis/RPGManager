info:
  name: Arcane Focus (Rod)
  type: http
  seq: 6
http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Foco Arcano (Bastão)",
        "Description": "Um Foco Arcano em forma de bastão, adornado com joias ou entalhado para canalizar magia arcana. Um Feiticeiro, Bruxo ou Mago pode usar este item como Foco de Conjuração.",
        "Cost": 10,
        "Weight": 0.9072
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
