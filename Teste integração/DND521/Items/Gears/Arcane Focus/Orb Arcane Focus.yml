info:
  name: Orb Arcane Focus
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/{{gear_partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Foco Arcano (Orbe)",
        "Description": "Um Foco Arcano em forma de orbe, adornado com joias ou entalhado para canalizar magia arcana. Um Feiticeiro, Bruxo ou Mago pode usar este item como Foco de Conjuração.",
        "Cost": 20,
        "Weight": 1.3608
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
