info:
  name: Sling Bullet
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/{{partial_url}}/create"
  body:
    type: json
    data: |-
      {
        "GameSystemId": "{{GameSystem}}",
        "CostCurrencyTypeId": "{{Copper_Piece_Currency_Type}}",
        "Name": "Projéteis de Estilingue",
        "Description": "Munição é um requisito para armas que possuem a propriedade Munição. A descrição da arma especifica o tipo de munição que ela utiliza. A tabela de Munição lista os diferentes tipos e a quantidade obtida ao comprá-los. A tabela também lista o item normalmente usado para armazenar cada tipo; o armazenamento deve ser adquirido separadamente.",
        "Amount": 20,
        "Storage": "Algibeira",
        "Weight": 0.68,
        "Cost": 4
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
