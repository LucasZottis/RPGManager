    data: |-
      {
        "AlternativeAbilityScoreId": null,
        "Name": "Versátil",
        "Description": "Uma arma versátil pode ser usada com uma ou duas mãos. Um valor de dano entre parênteses aparece junto à propriedade. A arma causa esse dano quando usada com as duas mãos para realizar um ataque corpo a corpo.",
