info:
  name: Sling
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/item/weapon/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Silver_Piece_Currency_Type}}",
        "Name": "Estilingue",
        "Cost": 1,
        "Weight": 0,
        "WeaponCategoryId": "{{Simple_Weapon_Category}}",
        "WeaponTypeId": "{{Ranged_Weapon_Type}}",
        "WeaponMasteryPropertyId": "{{Slow_Weapon_mastery_property}}",
        "BaseAbilityScoreId": "{{Dexterity}}",
        "Properties": [
          {
            "WeaponPropertyId": "{{Ammunition_Weapon_Property}}",
            "NormalRange": 9,
            "LongRange": 36,
            "AmmunitionTypeId": "{{Sling_Bullet_Ammunition_Type}}"
          }
        ],
        "Damages": [
          {
            "DamageTypeId": "{{Bludgeoning_Damage_Type}}",
            "DamageDiceTypes": [
              {
                "DiceTypeId": "{{D4}}",
                "Quantity": 1
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
