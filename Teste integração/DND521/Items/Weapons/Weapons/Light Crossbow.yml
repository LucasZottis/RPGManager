info:
  name: Light Crossbow
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/item/weapon/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Besta Leve",
        "Cost": 25,
        "Weight": 2.25,
        "WeaponCategoryId": "{{Simple_Weapon_Category}}",
        "WeaponTypeId": "{{Ranged_Weapon_Type}}",
        "WeaponMasteryPropertyId": "{{Slow_Weapon_mastery_property}}",
        "BaseAbilityScoreId": "{{Dexterity}}",
        "Properties": [
          {
            "WeaponPropertyId": "{{Ammunition_Weapon_Property}}",
            "NormalRange": 24,
            "LongRange": 96,
            "AmmunitionTypeId": "{{Bolts_Ammunition_Type}}"
          },
          {
            "WeaponPropertyId": "{{Loading_Weapon_Property}}",
            "NormalRange": null,
            "LongRange": null
          },
          {
            "WeaponPropertyId": "{{Two-Handed_Weapon_Property}}",
            "NormalRange": null,
            "LongRange": null
          }
        ],
        "Damages": [
          {
            "DamageTypeId": "{{Piercing_Damage_Type}}",
            "DamageDiceTypes": [
              {
                "DiceTypeId": "{{D8}}",
                "Quantity": 1
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
