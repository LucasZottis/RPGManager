info:
  name: Greatclub
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/item/weapon/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Silver_Piece_Currency_Type}}",
        "Name": "Clava Grande",
        "Cost": 2,
        "Weight": 4.53,
        "WeaponCategoryId": "{{Simple_Weapon_Category}}",
        "WeaponTypeId": "{{Melee_Weapon_Type}}",
        "WeaponMasteryPropertyId": "{{Push_Weapon_mastery_property}}",
        "BaseAbilityScoreId": "{{Strength}}",
        "Properties": [
          {
            "WeaponPropertyId": "{{Two-Handed_Weapon_Property}}",
            "NormalRange": null,
            "LongRange": null
          }
        ],
        "Damages": [
          {
            "DamageTypeId": "{{Bludgeoning_Damage_Type}}",
            "DamageDiceTypes": [
              {
                "DiceTypeId": "{{D8}}",
                "Quantity": 1
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
