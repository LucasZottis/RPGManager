info:
  name: Mace
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/item/weapon/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Maça",
        "Cost": 5,
        "Weight": 1.8,
        "WeaponCategoryId": "{{Simple_Weapon_Category}}",
        "WeaponTypeId": "{{Melee_Weapon_Type}}",
        "WeaponMasteryPropertyId": "{{Sap_Weapon_mastery_property}}",
        "BaseAbilityScoreId": "{{Strength}}",
        "Properties": [],
        "Damages": [
          {
            "DamageTypeId": "{{Bludgeoning_Damage_Type}}",
            "DamageDiceTypes": [
              {
                "DiceTypeId": "{{D6}}",
                "Quantity": 1
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
