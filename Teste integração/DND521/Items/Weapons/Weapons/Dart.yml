info:
  name: Dart
  type: http
  seq: 10

http:
  method: POST
  url: "{{url}}/item/weapon/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Copper_Piece_Currency_Type}}",
        "Name": "Dardo",
        "Cost": 5,
        "Weight": 0.11,
        "WeaponCategoryId": "{{Simple_Weapon_Category}}",
        "WeaponTypeId": "{{Ranged_Weapon_Type}}",
        "WeaponMasteryPropertyId": "{{Vex_Weapon_mastery_property}}",
        "BaseAbilityScoreId": "{{Dexterity}}",
        "Properties": [
          {
            "WeaponPropertyId": "{{Finesse_Weapon_Property}}",
            "NormalRange": null,
            "LongRange": null
          },
          {
            "WeaponPropertyId": "{{Thrown_Weapon_Property}}",
            "NormalRange": 6,
            "LongRange": 18
          }
        ],
        "Damages": [
          {
            "DamageTypeId": "{{Piercing_Damage_Type}}",
            "DamageDiceTypes": [
              {
                "DiceTypeId": "{{D4}}",
                "Quantity": 1
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
