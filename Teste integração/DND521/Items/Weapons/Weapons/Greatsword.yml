info:
  name: Greatsword
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/item/weapon/create"
  body:
    type: json
    data: |-
      {
        "CostCurrencyTypeId": "{{Gold_Piece_Currency_Type}}",
        "Name": "Espada Grande",
        "Cost": 50,
        "Weight": 2.7,
        "WeaponCategoryId": "{{Martial_Weapon_Category}}",
        "WeaponTypeId": "{{Melee_Weapon_Type}}",
        "WeaponMasteryPropertyId": "{{Graze_Weapon_mastery_property}}",
        "BaseAbilityScoreId": "{{Strength}}",
        "Properties": [
          {
            "WeaponPropertyId": "{{Heavy_Weapon_Property}}",
            "NormalRange": null,
            "LongRange": null
          },
          {
            "WeaponPropertyId": "{{Two-Handed_Weapon_Property}}",
            "NormalRange": null,
            "LongRange": null
          }
        ],
        "Damages": [
          {
            "DamageTypeId": "{{Slashing_Damage_Type}}",
            "DamageDiceTypes": [
              {
                "DiceTypeId": "{{D6}}",
                "Quantity": 2
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
