<div class="form-group">
    @if (label() !== "") {
    <label [for]="'txt-' + id()" class="form-label">
        {{label()}}
    </label>
    }

    <input type="text" class="form-input" [name]="id()" [id]="'txt-' + id()" [value]="value()" [class.error]="error()"
        [class.success]="!error()" [disabled]="isDisabled()" (input)="onChange($event)" />
</div>
