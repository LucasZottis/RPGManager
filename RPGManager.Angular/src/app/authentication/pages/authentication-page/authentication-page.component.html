<form [formGroup]="authenticateUser" (submit)="onSubmit()" class="login-card">
    <rpg-text-input id="txt-email" label="E-mail" formControlName="email" />
    <rpg-secret-input id="txt-password" label="Senha" formControlName="password" />

    <button type="submit" class="btn btn-primary">
        Entrar
    </button>
</form>
